name = "have-you-seen-my-shell"
main = "src/worker/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "have-you-seen-my-shell"
database_id = "YOUR_DATABASE_ID"

[[kv_namespaces]]
binding = "PAGE_CACHE"
id = "YOUR_KV_ID"

[[durable_objects.bindings]]
name = "LIVE_ROOM"
class_name = "LiveRoom"

[[migrations]]
tag = "v1"
new_classes = ["LiveRoom"]

[ai]
binding = "AI"

[assets]
directory = "./dist"
binding = "ASSETS"
